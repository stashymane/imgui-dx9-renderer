on:
  push:
    branches:
      - "master"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        target: [ x86_64-pc-windows-gnu ]
        profile: [ dev ] # release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64-i686
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'i686-pc-windows-gnu'

      - uses: actions/checkout@v6

      - uses: moonrepo/setup-rust@v1
        with:
          targets: ${{ matrix.target }}
          inherit-toolchain: true
          cache-extra-identifier: ${{ matrix.os }}-${{ matrix.target }}-${{ matrix.profile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: cargo build --target ${{ matrix.target }} --profile ${{ matrix.profile }}
